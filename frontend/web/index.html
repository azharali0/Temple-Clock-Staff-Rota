<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Temple Clock - Domiciliary Care Management">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Temple Clock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Temple Clock</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #F0F4F8;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(26, 43, 74, 0.1);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E1E8EF;
      border-top: 4px solid #00BFA5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .text {
      margin-top: 20px;
      color: #1A2B4B;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" class="loading-container">
    <img src="assets/images/logo.png" alt="Temple Clock Logo" class="logo" onerror="this.style.display='none'">
    <div class="spinner"></div>
    <div class="text">Loading Temple Clock...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Robust cleanup to prevent 'removeChild' of null error
    window.addEventListener('load', function() {
      // The engine handles removal usually, but we ensure it's safe
      console.log("Temple Clock: Web window loaded");
    });
  </script>
</body>
</html>
